services:
  - type: web
    name: eazybizy-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: ALLOWED_ORIGINS
        sync: false   # set to your Vercel URL(s), comma-separated, in the Render dashboard
